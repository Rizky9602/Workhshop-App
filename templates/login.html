<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Ekstraksi Informasi Dokumen Fabrikasi Ducting Berbasis CRF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0d6efd;
            --primary-hover: #0b5ed7;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(13, 110, 253, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
            padding: 40px 35px;
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-2px);
        }

        .logo-circle {
            width: 60px;
            height: 60px;
            background-color: #e0f2fe;
            color: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 20px;
        }

        .form-control-custom {
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 0.95rem;
            transition: all 0.2s ease-in-out;
            background-color: #f8fafc;
        }

        .form-control-custom:focus {
            background-color: #fff;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
            outline: none;
        }

        .btn-login {
            background-color: var(--primary-color);
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            font-size: 1rem;
            transition: background-color 0.2s ease;
        }

        .btn-login:hover {
            background-color: var(--primary-hover);
        }

        .error-alert {
            background-color: #fef2f2;
            border: 1px solid #fee2e2;
            color: #ef4444;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="logo-circle">
            <i class="bi bi-box-seam-fill"></i>
        </div>
        <h4 class="fw-bold text-center mb-2 text-dark" style="font-size: 1.25rem; line-height: 1.4;">Sistem Ekstraksi Informasi Dokumen Fabrikasi Ducting Berbasis CRF</h4>
        <p class="text-muted text-center mb-4 small">Masuk untuk mengelola bukti permintaan ducting.</p>

        {% if error %}
        <div class="error-alert">
            <i class="bi bi-exclamation-triangle-fill fs-5"></i>
            <div>{{ error }}</div>
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label class="form-label text-secondary small fw-semibold">Username</label>
                <div class="input-group">
                    <input type="text" name="username" class="form-control form-control-custom" placeholder="Masukkan username" required autofocus autocomplete="off">
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label text-secondary small fw-semibold">Password</label>
                <div class="input-group">
                    <input type="password" name="password" class="form-control form-control-custom" placeholder="Masukkan password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-login">
                Masuk <i class="bi bi-arrow-right ms-1"></i>
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
